apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai-gateway

resources:
- deployment.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 5
  target:
    kind: Deployment
    name: new-api

patchesJson6902:
- target:
    kind: Deployment
    name: new-api
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "4Gi"

configMapGenerator:
- name: new-api-config
  literals:
  - LOG_LEVEL=info
  - MODEL_RETRY_COUNT=3
  - MEMORY_CACHE_ENABLED=true
