apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api
  namespace: ai-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: new-api
  template:
    metadata:
      labels:
        app: new-api
    spec:
      containers:
      - name: api-server
        image: your-registry/new-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: DB_TYPE
          value: "postgres"
        - name: DSN
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: dsn
        - name: REDIS_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: conn-string
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: stripe-secret
              key: secret-key
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-service
  namespace: ai-gateway
spec:
  selector:
    app: new-api
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: new-api-ingress
  namespace: ai-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
  - host: api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: new-api-service
            port:
              number: 80
  tls:
  - hosts:
    - api.yourdomain.com
    secretName: new-api-tls
