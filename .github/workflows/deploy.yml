name: Build and Deploy

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    name: Backend Lint & Vet
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: "1.23"
    - name: go vet
      run: cd backend && go vet ./...
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        working-directory: backend
        version: latest
        args: --timeout=5m

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: "1.23"
    - name: Run unit tests
      run: cd backend && go test ./... -v -race -count=1 -timeout=10m

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: "1.23"
    - name: gosec
      uses: securego/gosec@master
      with:
        args: -fmt=json -out=gosec-report.json ./...

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: "npm"
        cache-dependency-path: web/package-lock.json
    - name: Install dependencies
      run: cd web && npm ci
    - name: Lint
      run: cd web && npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: "npm"
        cache-dependency-path: web/package-lock.json
    - name: Install dependencies
      run: cd web && npm ci
    - name: Build
      run: cd web && npm run build

  docker-build:
    name: Docker Build & Push
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/neuralbay-gateway:latest
          ${{ secrets.DOCKER_USERNAME }}/neuralbay-gateway:${{ github.sha }}
