# Render Blueprint — one-click deploy for NeuralBay AI Gateway
# Go to https://dashboard.render.com → Blueprint → Manual Sync

services:
  - type: web
    name: neuralbay-gateway
    runtime: docker
    repo: https://github.com/dukeboris/neuralbay-gateway
    plan: free
    region: singapore
    healthCheckPath: /api/status
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: SQLITE_PATH
        value: /data/one-api.db?_busy_timeout=30000
      - key: SESSION_SECRET
        generateValue: true
      - key: CRYPTO_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: TZ
        value: Asia/Singapore
      - key: ERROR_LOG_ENABLED
        value: "true"
      - key: NODE_NAME
        value: neuralbay-sin-1
